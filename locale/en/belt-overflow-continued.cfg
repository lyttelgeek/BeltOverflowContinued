[mod-setting-name]
belt_overflow_poll_frequency=Belt Scan Slice Size
belt_overflow_hot_cap=Max Overflow Belts Per Tick
belt_overflow_draw_indicators=Belt Overflow Indicators

[mod-setting-description]
belt_overflow_poll_frequency=How many terminal belts to sample per tick during the background scan. Higher values detect new overflows faster at a small ongoing CPU cost. Default (5) scans ~300 belts/second.
belt_overflow_hot_cap=Maximum number of overflowing belts to process per tick. Lower values protect UPS when many belts back up simultaneously, at the cost of slower item spilling. Default (20) suits a few intentional overflow points.
belt_overflow_draw_indicators=Draw red highlight areas around belts that have the potential to overflow
